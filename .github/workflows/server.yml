name: Firekid Server

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/server.yml'

concurrency:
  group: firekid-server
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      # ── 1. Free disk space ──
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      # ── 2. Pull image from GHCR (no build) ──
      - name: Pull image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker pull ghcr.io/${{ github.repository }}:latest
          echo "Image pulled successfully"
          docker images ghcr.io/${{ github.repository }}

      # ── 3. Start container ──
      - name: Start server container
        run: |
          docker run -d \
            --name firekid \
            --restart unless-stopped \
            -p 3000:3000 \
            -v firekid-services:/services \
            -v firekid-logs:/var/log/firekid \
            -e DASHBOARD_USERNAME="${{ secrets.DASHBOARD_USERNAME }}" \
            -e DASHBOARD_PASSWORD="${{ secrets.DASHBOARD_PASSWORD }}" \
            -e WORKER_URL="${{ secrets.WORKER_URL }}" \
            -e WORKER_SECRET="${{ secrets.WORKER_SECRET }}" \
            -e SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            -e GH_PAT="${{ secrets.GH_PAT }}" \
            -e DASHBOARD_PORT="3000" \
            ghcr.io/${{ github.repository }}:latest

          echo "Container started"
          docker ps --filter name=firekid

      # ── 4. Wait for dashboard to be healthy ──
      - name: Wait for dashboard
        run: |
          echo "Waiting for dashboard to stabilize..."
          STABLE=0
          for i in $(seq 1 90); do
            RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/auth/me 2>/dev/null || echo "000")
            if [ "$RESP" = "200" ]; then
              STABLE=$((STABLE + 1))
              echo "  Attempt $i: HTTP $RESP (stable: $STABLE/3)"
              if [ $STABLE -ge 3 ]; then
                echo "Dashboard is stable after ${i}s"
                break
              fi
            else
              STABLE=0
              if [ $((i % 5)) -eq 0 ]; then
                echo "  Attempt $i: HTTP $RESP (waiting...)"
              fi
            fi
            if [ $i -eq 90 ]; then
              echo "Dashboard failed to stabilize. Logs:"
              docker logs firekid --tail 80
              docker exec firekid cat /var/log/firekid/dashboard.err.log 2>/dev/null || echo "(empty)"
              exit 1
            fi
            sleep 2
          done

      # ── 5. Start Cloudflare tunnel on runner ──
      - name: Start Cloudflare tunnel
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          rm cloudflared-linux-amd64.deb

          cloudflared tunnel --no-autoupdate --protocol http2 run \
            --token "${{ secrets.CF_TUNNEL_TOKEN }}" \
            2>&1 &
          CF_PID=$!
          echo "CF_PID=$CF_PID" >> $GITHUB_ENV

          sleep 8
          if kill -0 $CF_PID 2>/dev/null; then
            echo "Cloudflare tunnel started (PID: $CF_PID)"
          else
            echo "Cloudflare tunnel failed to start"
            exit 1
          fi

      # ── 6. Server status ──
      - name: Server status
        run: |
          echo "Container:"
          docker ps --filter name=firekid --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          echo ""
          echo "Memory:"
          free -h
          docker stats firekid --no-stream --format "Container: {{.MemUsage}} ({{.MemPerc}})"
          echo ""
          echo "Public URL: https://server.firekidofficial.name.ng"

      # ── 7. Keep alive + self-restart at 5h20m ──
      - name: Keep alive
        run: |
          echo "Server is running."
          echo "Public URL: https://server.firekidofficial.name.ng"

          END_TIME=$(($(date +%s) + 5*3600 + 20*60))
          CYCLE=0

          while [ $(date +%s) -lt $END_TIME ]; do
            sleep 300
            CYCLE=$((CYCLE + 1))

            # Check container health
            if ! docker ps --filter name=firekid --filter status=running -q | grep -q .; then
              echo "[$CYCLE] Container stopped. Restarting..."
              docker start firekid || true
              sleep 10
            fi

            # Check HTTP health
            RESP=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/auth/me 2>/dev/null || echo "000")
            if [ "$RESP" != "200" ]; then
              echo "[$CYCLE] Dashboard unhealthy (HTTP $RESP). Restarting container..."
              docker restart firekid || true
              sleep 15
            fi

            # Check tunnel
            if ! kill -0 $CF_PID 2>/dev/null; then
              echo "[$CYCLE] Tunnel died. Restarting..."
              cloudflared tunnel --no-autoupdate --protocol http2 run \
                --token "${{ secrets.CF_TUNNEL_TOKEN }}" 2>&1 &
              CF_PID=$!
              sleep 5
            fi

            REMAINING=$(( $END_TIME - $(date +%s) ))
            MEM=$(docker stats firekid --no-stream --format "{{.MemUsage}}" 2>/dev/null || echo "N/A")
            echo "[$CYCLE] OK | Mem: $MEM | ${REMAINING}s remaining"
          done

          echo "5h20m elapsed. Saving state and triggering next run..."
          docker exec firekid pm2 save 2>/dev/null || true

          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/server.yml/dispatches \
            -d '{"ref":"main"}' \
            && echo "Next run triggered" \
            || echo "Failed to trigger next run"
